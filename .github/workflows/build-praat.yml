name: Building Praat!

on:
  push:
    branches:
      - '**'
  workflow_call:

jobs:
  Build-Linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            pkgarch: clang
            version: clang
            targetos: linux
            ccache_path: sccache
            compiler: clang
            compilerpp: clang++
            makefile: makefile.defs.linux.pulse-clang
            binary: praat
          - os: ubuntu-22.04
            pkgarch: clang_barren
            version: clang
            targetos: linux
            ccache_path: sccache
            compiler: clang
            compilerpp: clang++
            makefile: makefile.defs.linux.pulse-clang
            binary: praat_barren
          - os: ubuntu-22.04
            pkgarch: gcc
            version: gcc
            targetos: linux
            ccache_path: sccache
            compiler: gcc
            compilerpp: g++
            makefile: makefile.defs.linux.pulse-gcc
            binary: praat
          - os: ubuntu-22.04
            pkgarch: gcc_barren
            version: gcc
            targetos: linux
            ccache_path: sccache
            compiler: gcc
            compilerpp: g++
            makefile: makefile.defs.linux.pulse-gcc
            binary: praat_barren

    name: Linux (${{ matrix.compiler }}) (${{ matrix.binary }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.pkgarch }}-ccache
          variant: sccache

      - name: Install dependencies
        run: sudo apt install -y make rsync pkg-config libgtk-3-dev libasound2-dev libpulse-dev libjack-dev clang gcc g++ binutils xvfb

      - name: Build Praat
        run: |
          cp makefiles/${{ matrix.makefile }} makefile.defs
          EXTRA=""
          [[ "${{ matrix.binary }}" == "praat_barren" ]] && EXTRA="BARREN=1"
          make -j$(nproc) CC="${{ matrix.ccache_path }} ${{ matrix.compiler }}" CXX="${{ matrix.ccache_path }} ${{ matrix.compilerpp }}" $EXTRA
          cp ${{ matrix.binary }} Praat-${{ matrix.targetos }}_${{ matrix.version }}.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: praat-${{ matrix.targetos }}
          path: Praat-${{ matrix.targetos }}_${{ matrix.version }}.exe

  Build-Windows:
    strategy:
      matrix:
        include:
          - msystem: MINGW64
            shell: msys2 {0}
            pkgarch: x86_64
            version: intel64
            targetos: windows
            ccache_path: ~/.cargo/bin/sccache.exe
            compiler: gcc
            compilerpp: g++
            makefile: makefile.defs.msys-mingw64
            binary: Praat.exe

          - msystem: MINGW32
            shell: msys2 {0}
            pkgarch: i686
            version: intel32
            targetos: windows
            ccache_path: ~/.cargo/bin/sccache.exe
            compiler: gcc
            compilerpp: g++
            makefile: makefile.defs.msys-mingw32
            binary: Praat.exe

    name: Windows (${{ matrix.pkgarch }})
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.pkgarch }}-ccache
          variant: sccache

      - name: Install MSYS2, dependencies and ccache
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            make
            rsync
            pkg-config
            binutils
            mingw-w64-${{ matrix.pkgarch }}-gcc
            ccache

      - name: Build Praat
        shell: msys2 {0}
        run: |
          cp makefiles/${{ matrix.makefile }} makefile.defs
          EXTRA=""
          [[ "${{ matrix.binary }}" == "praat_barren" ]] && EXTRA="BARREN=1"
          make -j$(nproc) CC="${{ matrix.ccache_path }} ${{ matrix.compiler }}" CXX="${{ matrix.ccache_path }} ${{ matrix.compilerpp }}" $EXTRA
          cp ${{ matrix.binary }} Praat-${{ matrix.targetos }}_${{ matrix.version }}.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: praat-${{ matrix.targetos }}
          path: Praat-${{ matrix.targetos }}_${{ matrix.version }}.exe
