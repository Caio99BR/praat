name: Build and Test Praat

on:
  push:
    branches:
      - '**'
  workflow_call:

jobs:
  Build-Linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: clang
            makefile: makefile.defs.linux.pulse-clang
            binary: praat
            variant: full
          - os: ubuntu-22.04
            compiler: gcc
            makefile: makefile.defs.linux.pulse-gcc
            binary: praat
            variant: full
    name: Linux ${{ matrix.compiler }} (${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-ccache
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-ccache

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y make rsync pkg-config \
              libgtk-3-dev libasound2-dev libpulse-dev libjack-dev \
              clang gcc g++ xvfb ccache

      - name: Configure ccache
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          ccache --max-size=5G

      - name: Build Praat
        run: |
          cp makefiles/${{ matrix.makefile }} makefile.defs
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: praat-linux-${{ matrix.compiler }}
          path: ${{ matrix.binary }}

  Build-Windows:
    strategy:
      matrix:
        include:
          - msystem: MINGW64
            arch: intel64
            pkgarch: x86_64
            makefile: makefiles/makefile.defs.msys-mingw64
            shell: msys2 {0}
            binary: Praat.exe

          - msystem: MINGW32
            arch: intel32
            pkgarch: i686
            makefile: makefiles/makefile.defs.msys-mingw32
            shell: msys2 {0}
            binary: Praat.exe

    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2, dependencies and ccache
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            make
            rsync
            pkg-config
            mingw-w64-${{ matrix.pkgarch }}-gcc
            ccache

      - name: Configure ccache (Windows)
        shell: msys2 {0}
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          ccache --max-size=5G

      - name: Build Praat
        shell: msys2 {0}
        run: |
          cp ${{ matrix.makefile }} makefile.defs
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: praat-windows-${{ matrix.arch }}
          path: ${{ matrix.binary }}
