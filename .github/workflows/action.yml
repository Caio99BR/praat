name: Build Praat

description: Reusable build step for Praat

inputs:
  version:
    required: true
    description: Version for the build
  targetos:
    required: true
    description: The target OS (linux/windows)
  ccache_path:
    required: true
    description: Path to ccache
  toolchain:
    required: false
    description: Path to the toolchain (for Windows)
  prefix:
    required: true
    description: Prefix for the binary
  makefile:
    required: true
    description: Makefile to use
  binary:
    required: true
    description: The binary to build
  extension:
    required: true
    description: File extension for the binary

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt install -y libgtk-3-dev libasound2-dev libpulse-dev libjack-dev binutils-mingw-w64

    - name: Build Praat
      run: |
        cp makefiles/${{ inputs.makefile }} makefile.defs

        # Define PREFIX with PWD and toolchain path for Windows
        if [ "${{ inputs.toolchain }}" != "" ]; then
          PREFIX="$(pwd)/${{ inputs.toolchain }}/bin/${{ inputs.prefix }}"
        else
          PREFIX=""
        fi

        # Run the build
        make -j$(nproc) \
          PREFIX="${PREFIX}" \
          CC="${{ inputs.ccache_path }} ${PREFIX}clang" \
          CXX="${{ inputs.ccache_path }} ${PREFIX}clang++"

        # Copy binary output with platform and version specific naming
        cp ${{ inputs.binary }} Praat-${{ inputs.targetos }}_${{ inputs.version }}${{ inputs.extension }}

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: Praat-${{ inputs.targetos }}_${{ inputs.version }}
        path: Praat-${{ inputs.targetos }}_${{ inputs.version }}${{ inputs.extension }}
